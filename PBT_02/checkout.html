<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán đơn hàng</title>
</head>
<body>

    <h1>Xác nhận đặt hàng</h1>

    <!-- Phần 1: Giỏ hàng dùng <table> -->
    <h2>1. Danh sách sản phẩm</h2>
    <table border="1" style="width: 100%; border-collapse: collapse;">
        <thead>
            <tr>
                <th>STT</th>
                <th>Sản phẩm</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
                <th>Thành tiền</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Điện thoại iPhone</td>
                <td>20.000.000đ</td>
                <td>1</td>
                <td>20.000.000đ</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Ốp lưng silicon</td>
                <td>200.000đ</td>
                <td>2</td>
                <td>400.000đ</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Cáp sạc nhanh</td>
                <td>500.000đ</td>
                <td>1</td>
                <td>500.000đ</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="4" style="text-align: right; font-weight: bold;">Tổng cộng:</td>
                <td style="font-weight: bold;">20.900.000đ</td>
            </tr>
        </tfoot>
    </table>

    <hr>

    <form action="#" method="POST">
        <!-- Phần 2: Form thanh toán -->
        <h2>2. Hình thức thanh toán</h2>
        
        <input type="radio" id="cod" name="pttt" value="cod" checked>
        <label for="cod">COD (Thanh toán khi nhận hàng)</label><br>
        
        <input type="radio" id="bank" name="pttt" value="bank">
        <label for="bank">Chuyển khoản</label><br>
        
        <input type="radio" id="e-wallet" name="pttt" value="wallet">
        <label for="e-wallet">Ví điện tử</label>
        <br><br>

        <label for="coupon">Mã giảm giá:</label>
        <input type="text" id="coupon" name="coupon" 
               pattern="SALE[0-9]{4}" placeholder="Ví dụ: SALE2026">
        <br><br>

        <label for="note">Ghi chú:</label><br>
        <textarea id="note" name="note" rows="3" placeholder="Nhập ghi chú nếu có"></textarea>

        <!-- Phần 3: Thông tin giao hàng -->
        <h2>3. Thông tin giao hàng</h2>
        
        <label for="ship-date">Ngày giao hàng mong muốn:</label>
        <!-- Min là ngày mai: 2026-05-07 -->
        <input type="date" id="ship-date" name="ship-date" min="2026-05-07" required>
        <br><br>

        <label for="time">Khung giờ:</label>
        <select id="time" name="time">
            <option value="8-12">Sáng 8-12h</option>
            <option value="14-18">Chiều 14-18h</option>
            <option value="18-21">Tối 18-21h</option>
        </select>
        <br><br>

        <label for="range-day">Thời gian giao hàng (1-7 ngày):</label><br>
        1 <input type="range" id="range-day" name="range-day" min="1" max="7" step="1" value="3"> 7
        <br><br>

        <!-- Nút Submit với aria-label -->
        <button type="submit" aria-label="Xác nhận đặt hàng">Xác nhận đặt hàng</button>

    </form>

</body>
</html>
