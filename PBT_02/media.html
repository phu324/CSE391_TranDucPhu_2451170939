<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Multimedia Sản Phẩm</title>
</head>
<body>

    <h1>Giới thiệu Sản phẩm Công nghệ</h1>

  
    <section>
        <h2>Logo Thương Hiệu</h2>
        <svg width="100" height="100">
            <circle cx="50" cy="50" r="40" stroke="green" stroke-width="4" fill="yellow" />
            <text x="30" y="55" fill="black">LOGO</text>
        </svg>
    </section>

    <hr>


    <section>
        <h2>Hình ảnh Sản phẩm</h2>
        
        <figure>
            <img src="https://cdn.mos.cms.futurecdn.net/dmQc4x7D2XNDyoj4uQATCj.jpg"
                 alt="Điện thoại iPhone đời mới" loading="lazy" style="max-width: 100%; height: auto;">
            <figcaption>Điện thoại thông minh thế hệ mới</figcaption>
        </figure>

        <figure>
            <img src="https://th.bing.com/th/id/OIP.BFtu6gKlBUo0KwdZhM1KRAHaHa?o=7rm=3&rs=1&pid=ImgDetMain&o=7&rm=3"
                 alt="Laptop gaming giá rẻ" loading="lazy" style="max-width: 100%; height: auto;">
            <figcaption>Laptop văn phòng hiệu năng cao</figcaption>
        </figure>

        <figure>
            <img src="https://tse4.mm.bing.net/th/id/OIP.G918kytzSaBwSxlANX8k_gHaHa?rs=1&pid=ImgDetMain&o=7&rm=3"
                 alt="Tai nghe chống ồn không dây" loading="lazy" style="max-width: 100%; height: auto;">
            <figcaption>Tai nghe Bluetooth cao cấp</figcaption>
        </figure>
    </section>

    <hr>

   
    <section>
        <h2>Video Đánh giá (YouTube)</h2>
        <iframe width="560" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video player" frameborder="0" allowfullscreen></iframe>
    </section>

    <hr>

    <section>
        <h2>Video Review Chi Tiết</h2>
        <video controls poster="https://via.placeholder.com/800x450" width="600">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            <source src="https://www.w3schools.com/html/mov_bbb.webm" type="video/webm">
            Trình duyệt của bạn không hỗ trợ xem video.
        </video>
    </section>

    <hr>

   
    <section>
        <h2>Nhạc nền giới thiệu</h2>
        <audio controls>
            <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
            Trình duyệt của bạn không hỗ trợ nghe nhạc.
        </audio>
    </section>

</body>
</html>
