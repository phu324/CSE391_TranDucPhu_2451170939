<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug CSS Layout</title>
    <link rel="stylesheet" href="debug_layout.css">
</head>
<body>

    <h2 style="text-align: center;">Cách 1: Sử dụng border-box (Phổ biến)</h2>
    <div class="container clearfix">
        <div class="sidebar fix-way-1">Sidebar (Way 1)</div>
        <div class="content fix-way-1">Content (Way 1)</div>
    </div>

    <br><hr><br>

    <h2 style="text-align: center;">Cách 2: Tính toán thủ công (Không dùng border-box)</h2>
    <div class="container clearfix">
        <div class="sidebar fix-way-2">Sidebar (Way 2)</div>
        <div class="content fix-way-2">Content (Way 2)</div>
    </div>

</body>
</html>
