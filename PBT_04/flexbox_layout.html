<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Layout - Bài B2</title>
    <link rel="stylesheet" href="flexbox.css">
</head>
<body>

    <!-- Phần 1: Navbar -->
    <nav class="navbar">
        <div class="logo">MY LOGO</div>
        
        <ul class="nav-menu">
            <li><a href="#">Home</a></li>
            <li><a href="#">Products</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>

        <div class="nav-auth">
            <button class="btn-login">Login</button>
            <button class="btn-register">Register</button>
        </div>
    </nav>

    <!-- Phần 2: Product Cards Grid -->
    <div class="container">
        <h2 style="margin-bottom: 20px;">Sản phẩm nổi bật</h2>
        <div class="product-grid">
            <!-- Tạo 8 Card sản phẩm -->
            <!-- Card 1 -->
            <div class="product-card">
                <div class="card-img"></div>
                <div class="card-info">
                    <h3>iPhone 15 Pro</h3>
                    <p class="price">28.990.000đ</p>
                </div>
                <button class="buy-btn">Mua ngay</button>
            </div>

            <!-- Card 2 -->
            <div class="product-card">
                <div class="card-img"></div>
                <div class="card-info">
                    <h3>MacBook Air M2</h3>
                    <p class="price">24.500.000đ</p>
                </div>
                <button class="buy-btn">Mua ngay</button>
            </div>

            <!-- Card 3 -->
            <div class="product-card">
                <div class="card-img"></div>
                <div class="card-info">
                    <h3>Apple Watch S9</h3>
                    <p class="price">10.200.000đ</p>
                </div>
                <button class="buy-btn">Mua ngay</button>
            </div>

            <!-- Card 4 -->
            <div class="product-card">
                <div class="card-img"></div>
                <div class="card-info">
                    <h3>AirPods Pro 2</h3>
                    <p class="price">5.990.000đ</p>
                </div>
                <button class="buy-btn">Mua ngay</button>
            </div>

            <!-- Card 5 -->
            <div class="product-card">
                <div class="card-img"></div>
                <div class="card-info">
                    <h3>iPad Pro M2</h3>
                    <p class="price">21.000.000đ</p>
                </div>
                <button class="buy-btn">Mua ngay</button>
            </div>

            <!-- Card 6 -->
            <div class="product-card">
                <div class="card-img"></div>
                <div class="card-info">
                    <h3>Samsung S24 Ultra</h3>
                    <p class="price">30.000.000đ</p>
                </div>
                <button class="buy-btn">Mua ngay</button>
            </div>

            <!-- Card 7 -->
            <div class="product-card">
                <div class="card-img"></div>
                <div class="card-info">
                    <h3>Sony WH-1000XM5</h3>
                    <p class="price">8.500.000đ</p>
                </div>
                <button class="buy-btn">Mua ngay</button>
            </div>

            <!-- Card 8 -->
            <div class="product-card">
                <div class="card-img"></div>
                <div class="card-info">
                    <h3>Nintendo Switch</h3>
                    <p class="price">7.200.000đ</p>
                </div>
                <button class="buy-btn">Mua ngay</button>
            </div>
        </div>
    </div>

</body>
</html>
