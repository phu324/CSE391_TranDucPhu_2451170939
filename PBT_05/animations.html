<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài B2 - CSS Transitions & Animations</title>
    <link rel="stylesheet" href="animations.css">
</head>
<body>

    <div class="container">
   
        <div class="spinner-container">
            <div class="loading-spinner"></div>
            <p>Đang tải sản phẩm...</p>
        </div>

        <div class="product-grid fade-in-section">
            
            <div class="product-card">
                <div class="image-container">
                    <img src="https://picsum.photos/300/200" alt="Ảnh sản phẩm">
                </div>
                
                <div class="product-info">
                    <h3>Sản phẩm cao cấp</h3>
                    <p class="price">999.000 đ</p>
                    <button class="btn-buy">Mua ngay</button>
                </div>
            </div>
            <div class="product-card">
                <div class="image-container">
                    <img src="https://picsum.photos/300/200?random=1" alt="Ảnh sản phẩm">
                </div>
                <div class="product-info">
                    <h3>Sản phẩm đặc biệt</h3>
                    <p class="price">450.000 đ</p>
                    <button class="btn-buy">Mua ngay</button>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
