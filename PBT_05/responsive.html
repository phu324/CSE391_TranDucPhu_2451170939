<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Product Page</title>
    <link rel="stylesheet" href="responsive.css">
</head>
<body>

    <header class="header">
        <div class="logo">ShopTLU</div>
        <div class="hamburger">☰</div>
        <nav class="nav-menu">
            <a href="#">Trang chủ</a>
            <a href="#">Sản phẩm</a>
            <a href="#">Liên hệ</a>
        </nav>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <h3>Bộ lọc</h3>
            <select>
                <option>Tất cả sản phẩm</option>
                <option>Giá thấp đến cao</option>
                <option>Giá cao đến thấp</option>
            </select>
        </aside>

        <main class="product-grid">
            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Sản phẩm">
                <h4>Sản phẩm 1</h4>
                <p>100.000đ</p>
            </div>
            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Sản phẩm">
                <h4>Sản phẩm 2</h4>
                <p>200.000đ</p>
            </div>
            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Sản phẩm">
                <h4>Sản phẩm 3</h4>
                <p>300.000đ</p>
            </div>
            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Sản phẩm">
                <h4>Sản phẩm 4</h4>
                <p>400.000đ</p>
            </div>
            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Sản phẩm">
                <h4>Sản phẩm 5</h4>
                <p>500.000đ</p>
            </div>
            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Sản phẩm">
                <h4>Sản phẩm 6</h4>
                <p>600.000đ</p>
            </div>
            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Sản phẩm">
                <h4>Sản phẩm 7</h4>
                <p>700.000đ</p>
            </div>
            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Sản phẩm">
                <h4>Sản phẩm 8</h4>
                <p>800.000đ</p>
            </div>
        </main>

        <aside class="ads-bar">
            <h3>Quảng cáo</h3>
            <div class="ad-box">Banner 1</div>
        </aside>
    </div>

    <footer class="footer">
        <p>&copy; 2026 ShopTLU - Bài tập Thực hành CSS</p>
    </footer>

</body>
</html>
