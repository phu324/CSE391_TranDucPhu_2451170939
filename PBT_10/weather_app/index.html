<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài B1 - Weather App</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --error-color: #dc2626;
            --success-color: #16a34a;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f3f4f6;
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h2 { margin-top: 0; color: #1f2937; }
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 16px;
        }
        button {
            padding: 10px 16px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background-color: #1d4ed8; }
        
        /* Styles cho Lịch sử tìm kiếm */
        .history {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .history-item {
            background: #e5e7eb;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .history-item:hover { background: #d1d5db; }

        /* Styles cho 3 States */
        .state { padding: 16px; border-radius: 8px; text-align: center; }
        .hidden { display: none !important; }
        
        #loading-state { color: var(--primary-color); font-weight: 500; }
        .spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #error-state { background-color: #fee2e2; color: var(--error-color); }
        
        #success-state {
            background-color: #f0fdf4;
            color: #1e293b;
            border: 1px solid #bbf7d0;
        }
        .temp { font-size: 48px; font-weight: bold; margin: 10px 0; color: #111827; }
        .info-row { display: flex; justify-content: space-around; margin-top: 14px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🌤️ Ứng dụng Thời Tiết</h2>
        
        <div class="search-box">
            <input type="text" id="city-input" placeholder="Nhập tên thành phố (vd: Hanoi, Tokyo...)" />
            <button id="search-btn">Tìm</button>
        </div>

        <div class="history" id="history-container"></div>

        <div id="loading-state" class="state hidden">
            <div class="spinner"></div>
            <p>Đang tải dữ liệu thời tiết...</p>
        </div>

        <div id="error-state" class="state hidden">
            <p id="error-message">Đã xảy ra lỗi!</p>
        </div>

        <div id="success-state" class="state hidden">
            <h3 id="w-city" style="margin: 0; color: #374151;">Hanoi</h3>
            <div class="temp"><span id="w-temp">0</span>°C</div>
            <div id="w-desc" style="text-transform: capitalize; font-weight: 500;">Clear</div>
            <div class="info-row">
                <div>💧 Độ ẩm: <span id="w-humidity">0</span>%</div>
                <div>💨 Tốc độ gió: <span id="w-wind">0</span> km/h</div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const cityInput = document.getElementById('city-input');
        const searchBtn = document.getElementById('search-btn');
        const historyContainer = document.getElementById('history-container');
        
        const loadingState = document.getElementById('loading-state');
        const errorState = document.getElementById('error-state');
        const successState = document.getElementById('success-state');
        const errorMessage = document.getElementById('error-message');

        // State quản lý lịch sử tìm kiếm
        let searchHistory = JSON.parse(localStorage.getItem('weather_history')) || [];

        // Hàm điều khiển hiển thị UI States
        function changeState(state) {
            loadingState.classList.add('hidden');
            errorState.classList.add('hidden');
            successState.classList.add('hidden');

            if (state === 'LOADING') loadingState.classList.remove('hidden');
            if (state === 'ERROR') errorState.classList.remove('hidden');
            if (state === 'SUCCESS') successState.classList.remove('hidden');
        }

        // Hàm chính: Gọi API lấy thời tiết (Sử dụng API wttr.in định dạng JSON)
        async function fetchWeather(city) {
            if (!city.trim()) return;
            
            changeState('LOADING'); // Kích hoạt trạng thái Loading

            try {
                // Encode tên thành phố để tránh lỗi ký tự đặc biệt hoặc dấu cách trên URL
                const response = await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`);
                
                // Mạng thành công nhưng API trả lỗi hệ thống
                if (!response.ok) {
                    throw new Error(`Không thể kết nối với máy chủ (HTTP ${response.status})`);
                }

                const data = await response.json();

                // Kiểm tra tính hợp lệ của dữ liệu (wttr.in nếu sai tên thành phố đôi khi trả cấu trúc rỗng)
                if (!data.current_condition || data.current_condition.length === 0) {
                    throw new Error("Không tìm thấy thành phố này. Vui lòng kiểm tra lại tên tiếng Anh.");
                }

                // Parse & đổ dữ liệu thành công vào UI
                const current = data.current_condition[0];
                const area = data.nearest_area[0];
                
                document.getElementById('w-city').textContent = `${area.areaName[0].value}, ${area.country[0].value}`;
                document.getElementById('w-temp').textContent = current.temp_C;
                document.getElementById('w-desc').textContent = current.lang_vnm ? current.lang_vnm[0].value : current.weatherDesc[0].value;
                document.getElementById('w-humidity').textContent = current.humidity;
                document.getElementById('w-wind').textContent = current.windspeedKmph;

                changeState('SUCCESS'); // Hiển thị UI kết quả
                
                // Lưu thành phố vào lịch sử nếu lấy dữ liệu thành công
                saveToHistory(city);

            } catch (error) {
                // Xử lý tất cả các lỗi bao gồm mất mạng (Network Fail) hoặc sai tên thành phố
                errorMessage.textContent = `❌ Lỗi: ${error.message || "Mất mạng hoặc máy chủ không phản hồi."}`;
                changeState('ERROR');
            }
        }

        // Xử lý Lịch sử tìm kiếm bằng LocalStorage
        function saveToHistory(city) {
            const formattedCity = city.trim();
            
            // Xóa tên cũ nếu bị trùng để đẩy lên đầu
            searchHistory = searchHistory.filter(item => item.toLowerCase() !== formattedCity.toLowerCase());
            
            // Đưa thành phố mới lên đầu mảng
            searchHistory.unshift(formattedCity);
            
            // Giới hạn tối đa đúng 5 thành phố gần nhất
            if (searchHistory.length > 5) {
                searchHistory.pop();
            }

            // Đồng bộ dữ liệu vào LocalStorage
            localStorage.setItem('weather_history', JSON.stringify(searchHistory));
            renderHistory();
        }

        // Render danh sách nút lịch sử ra UI
        function renderHistory() {
            historyContainer.innerHTML = '';
            searchHistory.forEach(city => {
                const badge = document.createElement('span');
                badge.className = 'history-item';
                badge.textContent = city;
                // Click vào item lịch sử -> Tìm kiếm lại
                badge.addEventListener('click', () => {
                    cityInput.value = city;
                    fetchWeather(city);
                });
                historyContainer.appendChild(badge);
            });
        }

        // Lắng nghe sự kiện click nút "Tìm"
        searchBtn.addEventListener('click', () => {
            fetchWeather(cityInput.value);
        });

        // Hỗ trợ nhấn nút Enter để tìm kiếm
        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchWeather(cityInput.value);
        });

        // Khởi chạy ứng dụng: Đọc lịch sử từ LocalStorage và hiển thị sẵn (nếu có)
        renderHistory();
        if (searchHistory.length > 0) {
            cityInput.value = searchHistory[0];
            fetchWeather(searchHistory[0]); // Tự động load lại thành phố tìm gần nhất
        }
    </script>
</body>
</html>
