<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Todo App — TLU Student</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="todo-container">
        <header>
            <h1>📝 Việc Cần Làm</h1>
        </header>

        <form id="todoForm" class="todo-form">
            <input type="text" id="todoInput" placeholder="Bạn cần làm gì hôm nay?..." autocomplete="off">
            <button type="submit">Thêm</button>
        </form>

        <ul id="todoList" class="todo-list">
            </ul>

        <footer class="todo-footer">
            <span id="todoCount" class="todo-count">0 việc còn lại</span>
            
            <div class="todo-filters">
                <button data-filter="all" class="filter-btn active">Tất cả</button>
                <button data-filter="active" class="filter-btn">Chưa xong</button>
                <button data-filter="completed" class="filter-btn">Đã xong</button>
            </div>

            <button id="clearCompletedBtn" class="clear-completed">Xóa việc đã xong</button>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
